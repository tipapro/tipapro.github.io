  - title: Опыт работы
    layout: list
    content:
      - layout: left
        title: Ozon
        link: seller.ozon.ru
        sub_title: Ведущий Android разработчик
        caption: Июнь 2022 — наст. (1 год 9 месяцев)
        description: |
            (TODO написать результат для каждого пунтка)
            (TODO дополнить с р.2 и р.3)
            Выполнял разного спектра задачи в платформенной команде:
            - Ресёрч оптимизация Compose и помощь фиче-командам при оптимизации. Написал две статьи на Хабр и ProAndroidDev. В результате смогли понизить показатель лага на экранах со списками до 0% (Хитч рейт). Также благодарая статье и активной поддержке выросла компетентость других разработчиков по этой теме, что позволило им писать более оптимиальный Compose-код.
            - Написал фреймворк навигации поверх Jetpack Navigation, который позволил удобно организовать многомодульную навигацию, абстрагировать объявления экрана навигации от фреймворка, сами объявления декларативны. Также фрейморк решал прроблему миграции с фрагментов на чистый Compose. После успешной откатки фреймворк стал отдельной внутренней библиотекой для использования другими приложениями Ozon. Написал документацию по нему.
            - Участвовал в модуляризации, участвовал в выносе некоторых модулей в core, выносил самый сложный и легаси модуль для примера фиче-командам, писал документацию по выносу. Помогал фиче-командам в сложных кейсах и при проблемах с Dagger.
            - Участвовал в написании Ozon uikit 2022 на Compose. Следил за производительностью написанного кода при ревью. Писал некоторые ui компоненты. Следил за удобство API и соотсвествии практикам Google Material Compose.
            - Внедрял Ozon AbTool - внутреннюю библиотеку для фиче-флагов. Сделал статическую реализацию для удобного использования в коде.
            - Внедрял OzonID - внутреннюю библиотеку для авторизации. Пришлось копаться в самом старом и лапшичном коде приложения. По итогу внедрение произошло без багов.
            - Дорабатывал Ozon Tracker - внутреннюю библиотеку для аналитики. Сделал кастомизируемые события с удобным DSL. Итог - разработчикам теперь не нужно на каждое новое поле ходить в репозиторий трекер и по всему флоу доработки внутренней библиотеки добавлять туда одно поле.
            - Замещал стрим лида во время отпуска.
            - Проведение технических собеседований, написание новых вопросов (секция Compose) и дополненние существующих.
            - Написал сбор Total Time и впоследствии много дорабатывал.
            - TODO

      - layout: left
        title: Дар (Российский офис)
        link: dar.io
        sub_title: Android Developer
        caption: Май 2020 — Апрель 2022 (2 года)
        description: |
            Кодил в разных проектах:
            - писал фичи в приложении для инвестирования (для России и для Великобритании),
            - проектировал архитектуру и писал с нуля приложение для частного поcёлка и приложение для оплаты чаевых по лицу/QR коду
            - переносил дизайн-систему (палитру (светлую и тёмную) + элементы) из фигмы
            - рефакторил архитектуру приложения


