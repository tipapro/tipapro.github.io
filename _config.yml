about_content: |
  Попробовал множество направлений разработки. Люблю развивать, улучшать и экспериментировать с архитектурой проекта в поисках более простого и удобного варианта.
  
  Программирую с лета 2016 года на C#. С 06.2019 пишу под Android (на Xamarin.Android). С 04.2020 – на kotlin.
  

